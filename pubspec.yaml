name: palpa_marketplace
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: any

  flutter_riverpod: ^3.0.3
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  go_router: ^17.0.1
  smooth_page_indicator: ^2.0.1
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  equatable: ^2.0.7
  dio: ^5.9.0
  fpdart: ^1.2.0
  pinput: ^6.0.1
  shamsi_date: ^1.1.1
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  flutter_quill: ^11.5.0
  share_plus: ^12.0.1
  connectivity_plus: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  rename: ^3.1.0
  integration_test:
    sdk: flutter
  rename_app: ^1.6.6

flutter_native_splash:
  image: "assets/images/luncher.png"
  color: "#FFFFFF"
  android: true
  ios: true
  android_gravity: center
  fullscreen: true

  android_12:
    image: "assets/images/luncher.png"
    color: "#FFFFFF"
    android_gravity: center
    ios_content_mode: center
    fullscreen: true

flutter:
  uses-material-design: true
  generate: true
  config:
    enable-swift-package-manager: false

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: BahijNazanin
      fonts:
        - asset: assets/fonts/BahijNazanin-Regular.ttf
          weight: 400
        - asset: assets/fonts/BahijNazanin-Bold.ttf
          weight: 700
